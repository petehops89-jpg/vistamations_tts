<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devina II</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#07070f',
            surface: '#0d0d1c',
            accent: '#9b50ff',
            accent2: '#cc44ff',
            border: 'rgba(150,80,255,0.18)',
            dim: 'rgba(255,255,255,0.3)',
            text: 'rgba(255,255,255,0.85)',
            userBg: 'rgba(155,80,255,0.1)',
            aiBg: 'rgba(13,13,28,0.95)',
          },
          fontFamily: {
            cinzel: ['Cinzel', 'serif'],
            fell: ['IM Fell English', 'serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'pulse-glow': 'pulse-glow 3s ease-in-out infinite',
            'fade-up': 'fadeUp 0.3s ease forwards',
            'dot-bounce': 'dot-bounce 1.2s ease-in-out infinite',
          },
          keyframes: {
            'pulse-glow': {
              '0%, 100%': { boxShadow: '0 0 16px rgba(155,80,255,0.4)' },
              '50%': { boxShadow: '0 0 28px rgba(155,80,255,0.7)' },
            },
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'dot-bounce': {
              '0%, 80%, 100%': { transform: 'translateY(0)', opacity: '0.4' },
              '40%': { transform: 'translateY(-6px)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #07070f;
      color: rgba(255,255,255,0.85);
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 15% -10%, rgba(100,20,180,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 100%, rgba(180,20,100,0.12) 0%, transparent 60%);
      z-index: -1;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(155,80,255,0.3); border-radius: 4px; }
  </style>
  </head>
<body class="h-screen overflow-hidden font-fell flex flex-col">
  <div id="root" class="h-full flex flex-col"></div>
<script type="module" src="/index.tsx"></script></body>
</html>
